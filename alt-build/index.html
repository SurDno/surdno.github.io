<!DOCTYPE html>
<html lang="en">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <style>
        body {
            margin: 0;
            background-color: #0c0c0c;
            overflow: hidden;
            font-family: 'Consolas', 'Monaco', 'Lucida Console', monospace;
        }

        #telemetry {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #4CAF50;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            pointer-events: none;
            z-index: 100;
            border: 1px solid #333;
            min-width: 180px;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .telemetry-val {
            color: #fff;
            font-weight: bold;
        }

        #game-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #canvas {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
        }

        #mobile-controls {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        .touch-btn {
            position: absolute;
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.4); }
        
        #btn-left { bottom: 30px; left: 30px; }
        #btn-right { bottom: 30px; left: 110px; }
        #btn-jump { bottom: 30px; right: 30px; }
        #btn-fire { bottom: 110px; right: 30px; }
        #btn-wep1 { top: 30px; left: 30px; }
        #btn-wep2 { top: 30px; left: 110px; }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loader">BOOTING ENGINE...</div>
    
    <div id="telemetry" style="display: none;">
        <div class="telemetry-row"><span>API:</span> <span id="api-name" class="telemetry-val" style="color: #4CAF50;">--</span></div>
        <div class="telemetry-row"><span>FPS:</span> <span id="fps" class="telemetry-val">--</span> (min: <span id="fps-min">--</span>)</div>
        <div class="telemetry-row"><span>Total Delta:</span> <span id="delta" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>Main Total:</span> <span id="cpu" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>&nbsp;&nbsp;Gameplay:</span> <span id="gameplay" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>&nbsp;&nbsp;Render:</span> <span id="render" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>Sim Thread:</span> <span id="sim" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>Worker Overhead:</span> <span id="worker-sync" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>Master Send:</span> <span id="master-send" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>Resolution:</span> <span id="res" class="telemetry-val">--</span></div>
    </div>

    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div id="mobile-controls">
            <div id="btn-left" class="touch-btn">←</div>
            <div id="btn-right" class="touch-btn">→</div>
            <div id="btn-jump" class="touch-btn">↑</div>
            <div id="btn-fire" class="touch-btn">F</div>
            <div id="btn-wep1" class="touch-btn">W1</div>
            <div id="btn-wep2" class="touch-btn">W2</div>
        </div>
    </div>

    <script>
        const fpsEl = document.getElementById('fps');
        const cpuEl = document.getElementById('cpu');
        const simEl = document.getElementById('sim');
        const resEl = document.getElementById('res');
        const apiEl = document.getElementById('api-name');
        const telDiv = document.getElementById('telemetry');
        
        const gameEl = document.getElementById('gameplay');
        const rendEl = document.getElementById('render');
        const deltaEl = document.getElementById('delta');
        const fpsMinEl = document.getElementById('fps-min');
        
        const workEl = document.getElementById('worker-sync');
        const sendEl = document.getElementById('master-send');
        
        window.updateTelemetry = function(fps, cpu, sim, w, h, apiName, gameplay, render, delta, minFps, sync, send) {
            fpsEl.innerText = fps;
            fpsMinEl.innerText = Math.round(minFps);
            deltaEl.innerText = delta.toFixed(3) + " ms";
            cpuEl.innerText = cpu.toFixed(3) + " ms";
            gameEl.innerText = gameplay.toFixed(3) + " ms";
            rendEl.innerText = render.toFixed(3) + " ms";
            simEl.innerText = sim.toFixed(3) + " ms";
            if (workEl) workEl.innerText = sync.toFixed(3) + " ms";
            if (sendEl) sendEl.innerText = send.toFixed(3) + " ms";
            resEl.innerText = `${w}x${h}`;
            apiEl.innerText = apiName;
            if (telDiv.style.display === 'none') telDiv.style.display = 'block';
        };

        function hookTouch(id, keyCode) {
            const el = document.getElementById(id);
            if(!el) return;
            const press = (e) => { e.preventDefault(); if(Module && Module._set_key) Module._set_key(keyCode, true); };
            const release = (e) => { e.preventDefault(); if(Module && Module._set_key) Module._set_key(keyCode, false); };
            el.addEventListener('touchstart', press, {passive: false});
            el.addEventListener('touchend', release, {passive: false});
            el.addEventListener('touchcancel', release, {passive: false});
        }

        var Module = {
            canvas: document.getElementById('canvas'),
            printErr: function(text) {
                console.error(text);
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                if (text.includes("wasm") || text.includes("error") || text.includes("Exception") || text.includes("Aborted")) {
                    const loader = document.getElementById('loader');
                    loader.style.color = '#ff4444';
                    loader.style.display = 'block';
                    loader.innerHTML += '<br>' + text;
                }
            },
            onRuntimeInitialized: function() {
                document.getElementById('loader').style.display = 'none';
                console.log("Wasm Engine Initialized");
                
                if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                    document.getElementById('mobile-controls').style.display = 'block';
                    hookTouch('btn-left', 65); 
                    hookTouch('btn-right', 68); 
                    hookTouch('btn-jump', 87);
                    hookTouch('btn-fire', 32);
                    hookTouch('btn-wep1', 49); 
                    hookTouch('btn-wep2', 50); 
                }
            }
        };

        // --- WebGPU Implementation ---
        let wgpu = { ready: false, initStarted: false, chunks: new Map() };
        window.jsIsWebGPUReady = () => navigator.gpu ? 1 : 0;

        window.jsInitWebGPU = async (w, h) => {
            if (!navigator.gpu || wgpu.initStarted) return;
            wgpu.initStarted = true;
            try {
                const adapter = await navigator.gpu.requestAdapter();
                if (!adapter) {
                    console.error("No WebGPU adapter found. Try enabling 'Unsafe WebGPU' flag or checking hardware acceleration.");
                    if(Module && Module._switch_renderer) Module._switch_renderer(1);
                    return;
                }
                const device = await adapter.requestDevice();
                const context = Module.canvas.getContext("webgpu");
                const format = navigator.gpu.getPreferredCanvasFormat();
                context.configure({ device, format, alphaMode: 'opaque' });

                const wgsl = `
                    struct Uniforms { proj: mat4x4<f32>, view: mat4x4<f32> };
                    @group(0) @binding(0) var<uniform> u: Uniforms;
                    struct VertexInput { 
                        @location(0) pos: vec2<f32>, @location(1) uv: vec2<f32>,
                        @location(2) m0: vec4<f32>, @location(3) m1: vec4<f32>, @location(4) m2: vec4<f32>, @location(5) m3: vec4<f32>,
                        @location(6) color: vec4<f32>
                    };
                    struct VertexOutput { @builtin(position) pos: vec4<f32>, @location(0) uv: vec2<f32>, @location(1) color: vec4<f32> };
                    @vertex fn vs_main(in: VertexInput) -> VertexOutput {
                        let model = mat4x4<f32>(in.m0, in.m1, in.m2, in.m3);
                        return VertexOutput(u.proj * u.view * model * vec4<f32>(in.pos, 0.0, 1.0), in.uv, in.color);
                    }
                    @group(1) @binding(0) var t: texture_2d<f32>;
                    @group(1) @binding(1) var s: sampler;
                    @fragment fn fs_chunk(in: VertexOutput) -> @location(0) vec4<f32> { 
                        return textureSample(t, s, in.uv) * in.color; 
                    }
                    @fragment fn fs_quad(in: VertexOutput) -> @location(0) vec4<f32> { return in.color; }
                `;

                const module = device.createShaderModule({ code: wgsl });
                const layout0 = device.createBindGroupLayout({ entries: [{binding:0, visibility:GPUShaderStage.VERTEX, buffer:{}}] });
                const layout1_chunk = device.createBindGroupLayout({ entries: [{binding:0, visibility:GPUShaderStage.FRAGMENT, texture:{}}, {binding:1, visibility:GPUShaderStage.FRAGMENT, sampler:{}}] });
                const layout1_quad = device.createBindGroupLayout({ entries: [] }); 
                
                const pipeLayout = device.createPipelineLayout({ bindGroupLayouts: [layout0, layout1_chunk] });
                const quadPipeLayout = device.createPipelineLayout({ bindGroupLayouts: [layout0, layout1_quad] });

                const chunkPipe = device.createRenderPipeline({
                    layout: pipeLayout,
                    vertex: { module, entryPoint: 'vs_main', buffers: [
                        { arrayStride: 16, attributes: [{shaderLocation:0,format:'float32x2',offset:0},{shaderLocation:1,format:'float32x2',offset:8}] },
                        { arrayStride: 80, stepMode: 'instance', attributes: [
                            {shaderLocation:2,format:'float32x4',offset:0}, {shaderLocation:3,format:'float32x4',offset:16},
                            {shaderLocation:4,format:'float32x4',offset:32}, {shaderLocation:5,format:'float32x4',offset:48},
                            {shaderLocation:6,format:'float32x4',offset:64}
                        ]}
                    ]},
                    fragment: { module, entryPoint: 'fs_chunk', targets: [{ format, blend: { color: { srcFactor:'src-alpha', dstFactor:'one-minus-src-alpha' }, alpha: {} } }] },
                    primitive: { topology: 'triangle-list' }
                });

                const quadPipe = device.createRenderPipeline({
                    layout: quadPipeLayout,
                    vertex: { module, entryPoint: 'vs_main', buffers: [
                        { arrayStride: 16, attributes: [{shaderLocation:0,format:'float32x2',offset:0},{shaderLocation:1,format:'float32x2',offset:8}] },
                        { arrayStride: 80, stepMode: 'instance', attributes: [
                            {shaderLocation:2,format:'float32x4',offset:0}, {shaderLocation:3,format:'float32x4',offset:16},
                            {shaderLocation:4,format:'float32x4',offset:32}, {shaderLocation:5,format:'float32x4',offset:48},
                            {shaderLocation:6,format:'float32x4',offset:64}
                        ]}
                    ]},
                    fragment: { module, entryPoint: 'fs_quad', targets: [{ format, blend: { color: { srcFactor:'src-alpha', dstFactor:'one-minus-src-alpha' }, alpha: {} } }] },
                    primitive: { topology: 'triangle-list' }
                });

                const quadVerts = new Float32Array([-0.5,-0.5,0,0, 0.5,-0.5,1,0, -0.5,0.5,0,1, 0.5,0.5,1,1]);
                const vBuf = device.createBuffer({ size: quadVerts.byteLength, usage: GPUBufferUsage.VERTEX, mappedAtCreation: true });
                new Float32Array(vBuf.getMappedRange()).set(quadVerts); vBuf.unmap();
                const iBuf = device.createBuffer({ size: 12, usage: GPUBufferUsage.INDEX, mappedAtCreation: true });
                new Uint16Array(iBuf.getMappedRange()).set([0, 1, 2, 1, 3, 2]); iBuf.unmap();
                const uBuf = device.createBuffer({ size: 128, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
                const instBuf = device.createBuffer({ size: 1024 * 128, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
                const bind0 = device.createBindGroup({ layout: layout0, entries: [{binding:0, resource:{buffer:uBuf}}] });
                const colorBind = device.createBindGroup({ layout: layout1_quad, entries: [] });

                wgpu = { ready: true, device, queue: device.queue, context, format, chunkPipe, quadPipe, vBuf, iBuf, uBuf, bind0, instBuf, colorBind, chunks: new Map(), sampler: device.createSampler({magFilter:'nearest', minFilter:'nearest'}) };
                chunkList = [];
                console.log("WebGPU Full Implementation Ready");
            } catch (e) {
                console.error("WebGPU Init Error:", e);
                if(Module && Module._switch_renderer) Module._switch_renderer(1);
            }
        };

        let cachedInstData = new Float32Array(2048 * 20);
        let chunkList = [];

        window.jsUpdateWebGPUChunk = (gx, gy, pixelsPtr) => {
            if (!wgpu.ready) return;
            const key = `${gx},${gy}`;
            let chunk = wgpu.chunks.get(key);
            if (!chunk) {
                const tex = wgpu.device.createTexture({ size: [128, 128], format: 'rgba8unorm', usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST });
                const bind = wgpu.device.createBindGroup({ layout: wgpu.chunkPipe.getBindGroupLayout(1), entries: [{binding:0, resource:tex.createView()}, {binding:1, resource:wgpu.sampler}] });
                chunk = { tex, bind, rx: gx * 128.0 + 64.0, ry: gy * 128.0 + 64.0 };
                wgpu.chunks.set(key, chunk);
                chunkList.push(chunk);
            }
            wgpu.queue.writeTexture({ texture: chunk.tex }, new Uint8Array(Module['HEAPU8'].buffer, pixelsPtr, 128*128*4), { bytesPerRow: 128 * 4 }, [128, 128]);
        };

        window.jsRenderWebGPU = (projPtr, viewPtr, px, py, pw, ph, pdir, projsPtr, numProjs) => {
            if (!wgpu.ready) return;
            const { device, queue, context, chunkPipe, quadPipe, vBuf, iBuf, uBuf, bind0, instBuf, colorBind } = wgpu;
            
            queue.writeBuffer(uBuf, 0, new Float32Array(Module['HEAPU8'].buffer, projPtr, 16));
            queue.writeBuffer(uBuf, 64, new Float32Array(Module['HEAPU8'].buffer, viewPtr, 16));

            const encoder = device.createCommandEncoder();
            const pass = encoder.beginRenderPass({ colorAttachments: [{ view: context.getCurrentTexture().createView(), clearValue: {r:0.05, g:0.05, b:0.05, a:1}, loadOp: 'clear', storeOp: 'store' }] });
            
            pass.setBindGroup(0, bind0);
            pass.setVertexBuffer(0, vBuf);
            pass.setIndexBuffer(iBuf, 'uint16');

            const numChunks = chunkList.length;
            if (cachedInstData.length < (numChunks + numProjs + 1) * 20) {
                cachedInstData = new Float32Array((numChunks + numProjs + 1) * 20 * 2);
            }
            let fOff = 0;

            for (let i = 0; i < numChunks; i++) {
                const c = chunkList[i];
                cachedInstData[fOff++] = 128; cachedInstData[fOff++] = 0;   cachedInstData[fOff++] = 0; cachedInstData[fOff++] = 0;
                cachedInstData[fOff++] = 0;   cachedInstData[fOff++] = 128; cachedInstData[fOff++] = 0; cachedInstData[fOff++] = 0;
                cachedInstData[fOff++] = 0;   cachedInstData[fOff++] = 0;   cachedInstData[fOff++] = 1; cachedInstData[fOff++] = 0;
                cachedInstData[fOff++] = c.rx; cachedInstData[fOff++] = c.ry; cachedInstData[fOff++] = 0; cachedInstData[fOff++] = 1;
                cachedInstData[fOff++] = 1;   cachedInstData[fOff++] = 1;   cachedInstData[fOff++] = 1; cachedInstData[fOff++] = 1;
            }
            queue.writeBuffer(instBuf, 0, cachedInstData.buffer, 0, numChunks * 80);

            // Projectiles (COPY DIRECTLY FROM WASM HEAP)
            const projBaseOffset = numChunks * 80;
            if (numProjs > 0) {
                queue.writeBuffer(instBuf, projBaseOffset, Module['HEAPF32'].buffer, projsPtr, numProjs * 80);
            }

            // Player
            const playerBaseOffset = (numChunks + numProjs) * 80;
            cachedInstData[0] = pw; cachedInstData[1] = 0;  cachedInstData[2] = 0; cachedInstData[3] = 0;
            cachedInstData[4] = 0;  cachedInstData[5] = ph;  cachedInstData[6] = 0; cachedInstData[7] = 0;
            cachedInstData[8] = 0;  cachedInstData[9] = 0;  cachedInstData[10] = 1; cachedInstData[11] = 0;
            cachedInstData[12] = px; cachedInstData[13] = py;  cachedInstData[14] = 0; cachedInstData[15] = 1;
            cachedInstData[16] = 1;  cachedInstData[17] = 0.2;cachedInstData[18] = 0.2;cachedInstData[19] = 1;
            queue.writeBuffer(instBuf, playerBaseOffset, cachedInstData.buffer, 0, 80);

            pass.setPipeline(chunkPipe);
            for (let i = 0; i < numChunks; i++) {
                pass.setVertexBuffer(1, instBuf, i * 80, 80);
                pass.setBindGroup(1, chunkList[i].bind);
                pass.drawIndexed(6, 1);
            }

            if (numProjs > 0) {
                pass.setPipeline(quadPipe);
                pass.setBindGroup(1, colorBind);
                pass.setVertexBuffer(1, instBuf, projBaseOffset, numProjs * 80);
                pass.drawIndexed(6, numProjs);
            }

            pass.setPipeline(quadPipe);
            pass.setBindGroup(1, colorBind);
            pass.setVertexBuffer(1, instBuf, playerBaseOffset, 80);
            pass.drawIndexed(6, 1);

            pass.end();
            queue.submit([encoder.finish()]);
        };
        
        let script = document.createElement('script');
        script.src = "engine.js";
        document.body.appendChild(script);
    </script>
</body>
</html>
