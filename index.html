<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance WebGL 2.0</title>
    <style>
        body {
            margin: 0;
            background-color: #0c0c0c;
            overflow: hidden;
            font-family: 'Consolas', 'Monaco', 'Lucida Console', monospace;
        }

        #telemetry {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #4CAF50;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            pointer-events: none;
            z-index: 100;
            border: 1px solid #333;
            min-width: 180px;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .telemetry-val {
            color: #fff;
            font-weight: bold;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loader">BOOTING ENGINE...</div>
    
    <div id="telemetry" style="display: none;">
        <div class="telemetry-row"><span>FPS:</span> <span id="fps" class="telemetry-val">--</span></div>
        <div class="telemetry-row"><span>CPU Time:</span> <span id="cpu" class="telemetry-val">-- ms</span></div>
        <div class="telemetry-row"><span>Resolution:</span> <span id="res" class="telemetry-val">--</span></div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        const fpsEl = document.getElementById('fps');
        const cpuEl = document.getElementById('cpu');
        const resEl = document.getElementById('res');
        const telDiv = document.getElementById('telemetry');
        
        window.updateTelemetry = function(fps, cpu, w, h) {
            fpsEl.innerText = fps;
            cpuEl.innerText = cpu.toFixed(3) + " ms";
            resEl.innerText = `${w}x${h}`;
            if (telDiv.style.display === 'none') telDiv.style.display = 'block';
        };

        var Module = {
            canvas: document.getElementById('canvas'),
            onRuntimeInitialized: function() {
                document.getElementById('loader').style.display = 'none';
                console.log("Wasm Engine Initialized");
            }
        };
    </script>
    <script async src="bgfx_app.js"></script>
</body>
</html>
